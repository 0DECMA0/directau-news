name: Motor Periodístico DirectAU

on:
  schedule:
    # Se ejecuta todos los días a las 11:00 AM UTC (Aprox. 5:00 AM en Durango)
    - cron: '0 11 * * *'
  workflow_dispatch: # Esto te agrega un botón en GitHub para ejecutarlo a mano cuando quieras

jobs:
  generar-noticias:
    runs-on: ubuntu-latest
    
    steps:
      - name:  Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el Motor de Noticias (generator.py)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generator.py

      - name:  Guardar y subir a GitHub (Git Push)
        run: |
          git config --global user.name "DirectAU Bot Automático"
          git config --global user.email "bot@directau.news"
          
          # Agregamos los nuevos archivos
          git add src/content/news/*.md || true
          git add public/news-images/*.jpg || true
          
          # Hacemos commit y push SOLO si hay noticias nuevas
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Noticias nuevas publicadas por IA" && git push)